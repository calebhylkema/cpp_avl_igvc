[env:teensy41]
platform  = teensy
board     = teensy41
framework = arduino

; FlexCAN_T4 — CAN bus library for Teensy 4.x by tonton81
lib_deps =
    https://github.com/tonton81/FlexCAN_T4

; USB type: Serial (required for USB serial comms with ROS serial_bridge)
build_flags =
    -D USB_SERIAL

; Serial monitor baud — matches igvc_motor_firmware and serial_bridge_params.yaml
monitor_speed = 115200
