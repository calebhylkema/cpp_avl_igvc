igvc_cmd_vel_bridge:
  ros__parameters:

    # Physical robot geometry — MUST be calibrated to actual hardware
    wheel_base: 0.508           # meters, center-to-center distance between drive wheels

    # Speed at which duty cycle = 1.0 (full power) — calibrate empirically
    max_linear_speed: 1.0       # m/s

    # Motor inversion — must match igvc_hw/config/serial_bridge_params.yaml
    right_motor_inverted: true
    left_motor_inverted: false

    # Watchdog: publish "S\n" if no /cmd_vel received within this window
    cmd_timeout: 0.5            # seconds
