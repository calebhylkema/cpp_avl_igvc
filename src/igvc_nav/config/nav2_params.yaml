# =============================================================================
# igvc_nav — Nav2 parameters  —  AVL IGVC 2026
# Planner:    SMAC 2D (grid-based A*)
# Controller: MPPI   (Model Predictive Path Integral)
# Robot:      differential drive, outdoor, ~0.5 m wide
#
# Topics to configure for your sensor suite:
#   /scan      — 2-D LaserScan (lidar)
#   /odom      — nav_msgs/Odometry  (wheel odometry)
#   /imu/data  — sensor_msgs/Imu    (optional, for AMCL)
# =============================================================================

# ── AMCL (Monte Carlo localisation) ──────────────────────────────────────────
amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2             # rotation noise from rotation
    alpha2: 0.2             # rotation noise from translation
    alpha3: 0.2             # translation noise from translation
    alpha4: 0.2             # translation noise from rotation
    alpha5: 0.2             # (omni only)
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    scan_topic: "scan"
    laser_model_type: "likelihood_field"
    laser_max_range: 100.0
    laser_min_range: -1.0
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    lambda_short: 0.1
    update_min_a: 0.2       # rotate this much before updating
    update_min_d: 0.25      # translate this much before updating
    transform_tolerance: 1.0
    save_pose_rate: 0.5
    tf_broadcast: true
    set_initial_pose: false
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false

# ── BT Navigator ─────────────────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: "map"
    robot_base_frame: "base_link"
    odom_topic: "/odom"
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node

# ── Controller Server (MPPI) ──────────────────────────────────────────────────
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25    # meters — widen for outdoor IGVC
      yaw_goal_tolerance: 0.25   # radians

    # ── MPPI Controller ───────────────────────────────────────────────────
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"

      # Trajectory rollout settings
      time_steps: 56             # horizon length (steps)
      model_dt: 0.05             # seconds per step  → 2.8 s horizon
      batch_size: 2000           # number of sampled trajectories
      iteration_count: 1         # optimisation iterations per control cycle

      # Velocity limits (m/s, rad/s) — tune to robot capability
      vx_max:  0.50              # m/s forward max (conservative for IGVC)
      vx_min: -0.35              # m/s reverse max
      vy_max:  0.0               # diff drive has no lateral velocity
      wz_max:  1.9               # rad/s max angular

      # Acceleration limits
      ax_max:  3.0
      ax_min: -3.0
      ay_max:  3.0
      az_max:  3.5

      # Sampling noise standard deviations
      vx_std: 0.2
      vy_std: 0.0                # zero — diff drive
      wz_std: 0.4

      # Motion model: must be DiffDrive for our robot
      motion_model: "DiffDrive"

      # Misc
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      reset_period: 1.0
      regenerate_noises: false
      visualize: false           # set true to publish /trajectories for RViz debug

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      # Cost function critics
      critics:
        - "ConstraintCritic"
        - "CostCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4   # meters — engage near goal

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        forward_preference: true
        mode: 0

# ── Planner Server (SMAC 2D) ──────────────────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5                   # goal tolerance (m)
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true              # allow planning through unknown space
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0           # seconds
      cost_travel_multiplier: 2.0      # steer away from high-cost areas
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true

# ── Smoother Server ───────────────────────────────────────────────────────────
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ── Local Costmap ─────────────────────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: "odom"
      robot_base_frame: "base_link"
      rolling_window: true
      width: 4                         # meters
      height: 4
      resolution: 0.05                 # 5 cm per cell
      robot_radius: 0.35               # meters — conservative for ~0.5m wide robot
      update_frequency: 5.0
      publish_frequency: 2.0
      always_send_full_costmap: true
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55         # meters — add margin around obstacles
        cost_scaling_factor: 3.0

# ── Global Costmap ────────────────────────────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: "map"
      robot_base_frame: "base_link"
      robot_radius: 0.35
      resolution: 0.05
      track_unknown_space: true
      update_frequency: 1.0
      publish_frequency: 1.0
      always_send_full_costmap: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 3.0

# ── Map Server ────────────────────────────────────────────────────────────────
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""               # set via launch arg: map:=<path>

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ── Behavior Server ───────────────────────────────────────────────────────────
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic:    local_costmap/costmap_raw
    global_costmap_topic:   global_costmap/costmap_raw
    local_footprint_topic:  local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    robot_base_frame: "base_link"
    local_frame: "odom"
    global_frame: "map"
    transform_tolerance: 0.1
    cycle_frequency: 10.0
    simulate_ahead_time: 2.0
    # Rotational recovery limits
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    behavior_plugins: ["spin", "back_up", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    back_up:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"

# ── Waypoint Follower ─────────────────────────────────────────────────────────
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200   # ms to pause at each waypoint

# ── Velocity Smoother ─────────────────────────────────────────────────────────
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    odom_topic: "/odom"
    odom_duration: 0.1
    # Must stay within MPPI vx/wz limits
    max_velocity:  [ 0.50,  0.0,  1.9]   # [vx, vy, wz]
    min_velocity:  [-0.35,  0.0, -1.9]
    max_accel:     [ 2.50,  0.0,  3.2]
    max_decel:     [-2.50,  0.0, -3.2]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
