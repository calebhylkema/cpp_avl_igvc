controller_manager:
  ros__parameters:
    update_rate: 50  # Hz — matches Teensy CAN output rate

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_drive_controller:
  ros__parameters:
    left_wheel_names:  ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.508
    wheel_radius:     0.0345

    # Publish odom at controller rate
    publish_rate: 50.0

    # Odometry
    odom_frame_id:       odom
    base_frame_id:       base_footprint
    pose_covariance_diagonal:     [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal:    [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    open_loop: false

    # Velocity limits — conservative for initial testing
    linear.x.has_velocity_limits:      true
    linear.x.max_velocity:             0.5    # m/s
    linear.x.has_acceleration_limits:  true
    linear.x.max_acceleration:         1.0    # m/s^2

    angular.z.has_velocity_limits:     true
    angular.z.max_velocity:            2.0    # rad/s
    angular.z.has_acceleration_limits: true
    angular.z.max_acceleration:        3.0    # rad/s^2

    # Accept plain Twist (not TwistStamped) so teleop_twist_keyboard works
    use_stamped_vel: false

    # Command timeout — stop if no cmd_vel for 500ms
    cmd_vel_timeout: 0.5
